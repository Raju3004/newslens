<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="NewsLens compares how different real news outlets cover the same story — tone and emphasis, side by side. No login, no accounts." />
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔍</text></svg>" />
<title>NewsLens — See How Different Outlets Cover the Same Story</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: 'Georgia', 'Times New Roman', serif; }
  .sans { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  .tone-badge { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
</style>
</head>
<body class="bg-stone-50 text-stone-900 min-h-screen">

  <header class="border-b-4 border-stone-900 bg-white">
    <div class="max-w-5xl mx-auto px-6 py-6">
      <h1 class="text-4xl font-bold tracking-tight">NewsLens</h1>
      <p class="sans text-stone-600 mt-1">A nutrition label for news — compare tone and framing across real sources, side by side.</p>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-6 py-8">

    <form id="searchForm" class="mb-2">
      <input
        id="topicInput"
        type="text"
        placeholder="Try: election results, RBI interest rate, cricket controversy..."
        class="sans w-full border-2 border-stone-900 rounded-lg px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-stone-900 mb-3"
        required
      />
      <div class="flex flex-col sm:flex-row gap-3">
        <button
          type="submit"
          data-mode="fast"
          class="mode-btn sans flex-1 bg-white border-2 border-stone-900 text-stone-900 px-4 py-3 rounded-lg font-semibold hover:bg-stone-100 transition"
        >
          Just Show Articles
          <span class="block text-xs font-normal text-stone-500">Instant, no AI wait</span>
        </button>
        <button
          type="submit"
          data-mode="compare"
          class="mode-btn sans flex-1 bg-stone-900 border-2 border-stone-900 text-white px-4 py-3 rounded-lg font-semibold hover:bg-stone-700 transition"
        >
          Compare Tone
          <span class="block text-xs font-normal text-stone-300">Articles appear instantly, tone tags follow</span>
        </button>
      </div>
    </form>
    <p class="sans text-xs text-stone-500 mb-8">Sources are real news outlets. We describe tone and emphasis — we never judge what's "true" or "false."</p>

    <div id="status" class="sans text-stone-600"></div>
    <div id="results" class="grid gap-5 mt-4 sm:grid-cols-2 lg:grid-cols-3"></div>

  </main>

  <footer class="sans text-center text-xs text-stone-400 py-10">
    Built for media literacy, not for verdicts. Always read the original source.
  </footer>

<script>
const form = document.getElementById('searchForm');
const input = document.getElementById('topicInput');
const modeBtns = document.querySelectorAll('.mode-btn');
const statusEl = document.getElementById('status');
const resultsEl = document.getElementById('results');

const toneColors = {
  neutral: 'bg-slate-100 text-slate-700 border-slate-300',
  urgent: 'bg-red-50 text-red-700 border-red-300',
  emotional: 'bg-amber-50 text-amber-700 border-amber-300',
  analytical: 'bg-blue-50 text-blue-700 border-blue-300',
  cautious: 'bg-emerald-50 text-emerald-700 border-emerald-300',
};

function toneClass(tone) {
  const key = (tone || '').toLowerCase().split(/[\s,/]+/)[0];
  return toneColors[key] || 'bg-stone-100 text-stone-700 border-stone-300';
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

function renderPlainCard(article) {
  return `
    <div class="bg-white border-2 border-stone-200 rounded-xl p-5 hover:border-stone-400 transition">
      <div class="sans text-xs font-semibold text-stone-500 uppercase tracking-wide mb-2">${escapeHtml(article.source)}</div>
      <a href="${article.url}" target="_blank" rel="noopener" class="font-bold text-lg leading-snug hover:underline block">${escapeHtml(article.title)}</a>
      ${article.publishedAt ? `<div class="sans text-xs text-stone-400 mt-3">${new Date(article.publishedAt).toLocaleDateString()}</div>` : ''}
    </div>
  `;
}

function renderLoadingCard(article, id) {
  return `
    <div class="bg-white border-2 border-stone-200 rounded-xl p-5" id="${id}">
      <div class="flex items-start justify-between gap-3 mb-2">
        <div class="sans text-xs font-semibold text-stone-500 uppercase tracking-wide">${escapeHtml(article.source)}</div>
        <span class="tone-badge text-xs font-semibold px-2 py-1 rounded-full border bg-stone-100 text-stone-400 border-stone-200 animate-pulse">analyzing...</span>
      </div>
      <a href="${article.url}" target="_blank" rel="noopener" class="font-bold text-lg leading-snug hover:underline block mb-3">${escapeHtml(article.title)}</a>
      <div class="sans text-sm text-stone-400">Reading tone and framing...</div>
      ${article.publishedAt ? `<div class="sans text-xs text-stone-400 mt-3">${new Date(article.publishedAt).toLocaleDateString()}</div>` : ''}
    </div>
  `;
}

function renderAnalyzedCard(article) {
  const a = article.analysis || {};
  return `
    <div class="bg-white border-2 border-stone-200 rounded-xl p-5 hover:border-stone-400 transition">
      <div class="flex items-start justify-between gap-3 mb-2">
        <div class="sans text-xs font-semibold text-stone-500 uppercase tracking-wide">${escapeHtml(article.source)}</div>
        <span class="tone-badge text-xs font-semibold px-2 py-1 rounded-full border ${toneClass(a.tone)}">${escapeHtml(a.tone || 'Unknown')}</span>
      </div>
      <a href="${article.url}" target="_blank" rel="noopener" class="font-bold text-lg leading-snug hover:underline block mb-3">${escapeHtml(article.title)}</a>
      <div class="sans text-sm text-stone-700 space-y-2">
        <div><span class="font-semibold">Emphasis:</span> ${escapeHtml(a.emphasis)}</div>
        ${a.notable_language ? `<div><span class="font-semibold">Notable phrasing:</span> "${escapeHtml(a.notable_language)}"</div>` : ''}
      </div>
      ${article.publishedAt ? `<div class="sans text-xs text-stone-400 mt-3">${new Date(article.publishedAt).toLocaleDateString()}</div>` : ''}
    </div>
  `;
}

function setButtonsDisabled(disabled) {
  modeBtns.forEach((b) => (b.disabled = disabled));
}

async function analyzeCardInPlace(article, cardId) {
  try {
    const res = await fetch('/api/analyze-one', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ article }),
    });
    const data = await res.json();
    const card = document.getElementById(cardId);
    if (!card) return;
    if (!res.ok) {
      card.outerHTML = renderAnalyzedCard({ ...article, analysis: { tone: 'Unknown', emphasis: 'Could not analyze this article.', notable_language: '' } });
      return;
    }
    card.outerHTML = renderAnalyzedCard({ ...article, analysis: data.analysis });
  } catch {
    const card = document.getElementById(cardId);
    if (card) card.outerHTML = renderAnalyzedCard({ ...article, analysis: { tone: 'Unknown', emphasis: 'Could not analyze this article.', notable_language: '' } });
  }
}

async function runSearch(topic, mode) {
  setButtonsDisabled(true);
  statusEl.textContent = 'Searching...';
  resultsEl.innerHTML = '';

  try {
    const searchRes = await fetch(`/api/search?topic=${encodeURIComponent(topic)}`);
    const searchData = await searchRes.json();

    if (!searchRes.ok) {
      statusEl.textContent = searchData.error || 'Something went wrong.';
      return;
    }

    const articles = searchData.articles;

    if (mode === 'fast') {
      // Fast path: show real articles instantly, no AI call at all.
      statusEl.textContent = `${articles.length} articles on "${topic}":`;
      resultsEl.innerHTML = articles.map(renderPlainCard).join('');
      return;
    }

    // Compare path: articles appear immediately, each card's tone tag
    // fills in independently as soon as that article's analysis finishes —
    // nobody waits on the slowest article.
    statusEl.textContent = `${articles.length} articles found. Reading tone as it comes in...`;
    resultsEl.innerHTML = articles
      .map((a, i) => renderLoadingCard(a, `card-${i}`))
      .join('');

    await Promise.all(articles.map((a, i) => analyzeCardInPlace(a, `card-${i}`)));
    statusEl.textContent = `Comparing ${articles.length} sources on "${topic}":`;
  } catch (err) {
    console.error(err);
    statusEl.textContent = 'Network error. Please check your connection and try again.';
  } finally {
    setButtonsDisabled(false);
  }
}

form.addEventListener('submit', (e) => {
  e.preventDefault();
  const topic = input.value.trim();
  if (!topic) return;
  const mode = (e.submitter && e.submitter.dataset.mode) || 'compare';
  runSearch(topic, mode);
});
</script>
</body>
</html>
